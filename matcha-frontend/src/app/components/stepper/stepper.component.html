<div class="flex h-full w-full flex-col">
  <div class="flex flex-col gap-4 bg-white p-4">
    <div class="relative flex items-center justify-center">
      @if (currentStepIdx() > 0) {
        <button
          class="absolute left-4"
          appButtonIcon
          icon="icon-arrow-left"
          (click)="goPreviousStep()"
        ></button>
      }
      <h2 class="text-MD">{{ currentTitle() }}</h2>
    </div>
    <div class="mx-auto flex w-full items-center gap-4">
      @for (step of stepsRef(); track $index) {
        <div
          [class.from-latte-maroon]="step.isVisible()"
          [class.to-latte-pink]="step.isVisible()"
          [class.from-gray-200]="!step.isVisible()"
          [class.to-gray-200]="!step.isVisible()"
          class="h-1 grow rounded-full bg-linear-to-br transition-colors duration-150"
        ></div>
      }
    </div>
  </div>
  <div class="grow">
    <ng-content />
  </div>

  <div class="flex justify-between gap-8 bg-white p-4">
    <button
      appButtonSecondary
      icon="icon-arrow-right"
      class="hidden w-full max-w-96 items-center justify-center gap-2 md:flex"
      (click)="currentStepIdx() > 0 ? goPreviousStep() : cancel.emit()"
    >
      {{ currentStepIdx() > 0 ? ('Retour' | i18n)() : ('Annuler' | i18n)() }}
      <app-icon name="icon-arrow-right" />
    </button>
    <button
      appButtonPrimary
      icon="icon-arrow-right"
      class="flex w-full items-center justify-center gap-2 md:max-w-96"
      [disabled]="!currentStepRef()?.isValid()"
      (click)="currentStepIdx() < stepsLength() - 1 ? goNextStep() : complete.emit()"
    >
      {{ currentStepIdx() < stepsLength() - 1 ? ('Continuer' | i18n)() : ('Compléter' | i18n)() }}
      <app-icon name="icon-arrow-right" />
    </button>
  </div>
</div>
