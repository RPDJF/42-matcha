name: Prettier Check - matcha-frontend

on:
  push:
    branches:
      - "*"
    paths:
      - "matcha-frontend/**"
  pull_request:
    branches:
      - "*"
    paths:
      - "matcha-frontend/**"

jobs:
  frontend-format:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: matcha-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npm run format:check
