name: Frontend Tests - matcha-frontend

on:
  push:
    branches:
      - main
    paths:
      - "matcha-frontend/**"
  pull_request:
    branches:
      - main
    paths:
      - "matcha-frontend/**"

jobs:
  test-frontend:
    name: Run Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: matcha-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
