name: Frontend Mock Deploy (GitHub Pages)

on:
  push:
    branches:
      - main
    paths:
      - "matcha-frontend/**"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Angular App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: matcha-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: matcha-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: |
          npm run build -- --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Prepare Pages artifact
        run: |
          mkdir pages
          cp -r dist/matcha-frontend/browser/* pages/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
